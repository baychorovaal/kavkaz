<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Caucasian Cuisine</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="header">
  <h1 class="header__title" data-i18n="title"></h1>
  <p class="header__subtitle" data-i18n="subtitle"></p>
</header>

<div class="controls">

  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('ar')">AR</button>
  <button onclick="setLang('de')">DE</button>
  <button onclick="setLang('es')">ES</button>
  <button onclick="setLang('fr')">FR</button>
  <button onclick="setLang('it')">IT</button>
  <button onclick="setLang('ja')">JA</button>
  <button onclick="setLang('ko')">KO</button>
  <button onclick="setLang('tr')">TR</button>
  <button onclick="setLang('zh')">ZH</button>

  <button onclick="toggleTheme()">🌓</button>
</div>

<main id="app"></main>

<script src="./script.js"></script>
</body>
</html>
