<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Кавказская кухня</title>

<style>
:root {
    --color-main: #7B1F2B;

    --green: #2d7447;
    --brown: #8d6023;
    --blue: #234c7b;
    --purple: #693c96;

    --card-green: #61c76b;
    --card-yellow: #cdb366;
    --card-blue: #5e81c7;
    --card-purple: #9570de;

    --space: 20px;
    --font: Arial, sans-serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font);
}

.header, .footer {
    background: var(--color-main);
    color: white;
    text-align: center;
    padding: var(--space);
}

.section {
    padding: 30px 20px;
}

.section__title {
    text-align: center;
    margin-bottom: 20px;
}

.section--green { background: var(--green); }
.section--brown { background: var(--brown); }
.section--blue { background: var(--blue); }
.section--purple { background: var(--purple); }

.section__cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 250px;
}

.card--green { background: var(--card-green); }
.card--yellow { background: var(--card-yellow); }
.card--blue { background: var(--card-blue); }
.card--purple { background: var(--card-purple); }

.card__img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card__content {
    padding: 10px;
}

.card__title {
    margin-bottom: 10px;
    font-size: 18px;
}

.card__text {
    font-size: 14px;
    color: white;
}


[dir="rtl"] .section__cards {
    flex-direction: row-reverse;
}
</style>
</head>

<body>

<div class="header">
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
</div>

<div style="text-align:center; margin:10px;">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ar')">AR</button>
</div>

<div class="section section--green">
    <h2 class="section__title" data-i18n="karachay"></h2>
    <div class="section__cards">

        <div class="card card--green">
            <img class="card__img" src="https://avatars.mds.yandex.net/i?id=435379b56f80462fbbe7f1890a121826_l-5233806-images-thumbs&n=13">
            <div class="card__content">
                <h3 data-i18n="khychin"></h3>
                <p data-i18n="khychin_desc"></p>
            </div>
        </div>

        <div class="card card--green">
            <img class="card__img" src="https://avatars.mds.yandex.net/i?id=cf27878de823fa11de28e2e02cb4cd4189fa8860-5242655-images-thumbs&n=13">
            <div class="card__content">
                <h3 data-i18n="bishlak"></h3>

        </div>

            <div class="card__content">
                <h3 data-i18n="ayran"></h3>

</div>

            <div class="card__content">

        <div class="card card--blue">
            <img class="card__img" src="https://avatars.mds.yandex.net/i?id=b8d6803bebea53add5e1df9c25a0173e51460a67-4360605-images-thumbs&n=13">

</div>

</div>

<script>
const languages = { ru: {
title:"Вкусный Кавказ",

kurze:"Курзе", kurze_desc:"Пельмени",

zhizhig:"Жижиг-галнаш", zhizhig_desc:"Мясо с галушками",
chepalgash:"Чепалгаш", chepalgash_desc:"Лепешки с тыквой",
siskal:"Сискал", siskal_desc:"Кукурузные лепешки",

footer:"Традиции Кавказа в каждом блюде!"
},

en: {
title:"Tasty Caucasus",
subtitle:"Caucasian cuisine",
karachay:"Karachay cuisine",
kabard:"Kabardian cuisine",
dagestan:"Dagestan cuisine",
chechen:"Chechen cuisine",

khychin:"Khychin", khychin_desc:"Pies with sour cream",
bishlak:"Bishlak", bishlak_desc:"Potatoes with cheese",
ayran:"Ayran", ayran_desc:"Refreshing drink",

gedlibje:"Gedlibje", gedlibje_desc:"Chicken in sauce",
lyagur:"Lyagur", lyagur_desc:"Fried meat",
ships:"Ships", ships_desc:"Meat sauce",

hinkal:"Hinkal", hinkal_desc:"Dough with meat",
chudu:"Chudu", chudu_desc:"Flatbread",
kurze:"Kurze", kurze_desc:"Dumplings",

zhizhig:"Zhizhig", zhizhig_desc:"Meat with dumplings",
chepalgash:"Chepalgash", chepalgash_desc:"Pumpkin flatbread",
siskal:"Siskal", siskal_desc:"Corn bread",

footer:"Traditions in every dish!"
},

ar: {
title:"القوقاز اللذيذ",
subtitle:"مأكولات القوقاز",
karachay:"مطبخ قراتشاي",
kabard:"المطبخ القبردي",
dagestan:"مطبخ داغستان",
chechen:"المطبخ الشيشاني",

khychin:"خيتشين", khychin_desc:"فطائر بالقشدة",
bishlak:"بيشلاك", bishlak_desc:"بطاطا مع الجبن",
ayran:"آيران", ayran_desc:"مشروب منعش",

gedlibje:"جدلبجي", gedlibje_desc:"دجاج بالصلصة",
lyagur:"لياغور", lyagur_desc:"لحم مقلي",
ships:"شيبس", ships_desc:"صلصة لحم",

hinkal:"خينكال", hinkal_desc:"عجين مع اللحم",
chudu:"تشودو", chudu_desc:"خبز محشو",
kurze:"كورزي", kurze_desc:"زلابية",

zhizhig:"جيجيج", zhizhig_desc:"لحم مع عجين",
chepalgash:"تشيبالغاش", chepalgash_desc:"خبز بالقرع",
siskal:"سيسكال", siskal_desc:"خبز الذرة",

footer:"تقاليد القوقاز في كل طبق!"
} };

let currentLang="ru";

function setLang(lang){
currentLang=lang;
document.documentElement.dir = (lang==="ar") ? "rtl" : "ltr";
translate();
}

function translate(){
document.querySelectorAll("[data-i18n]").forEach(el=>{
el.textContent = languages[currentLang][el.dataset.i18n];
});
}

translate();
</script>

</body>
</html>
